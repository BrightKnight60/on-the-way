databases:
  - name: onthewaydb
    plan: free
    databaseName: ontheway
    user: ontheway

services:
  - type: web
    plan: free
    name: ontheway
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn HandyRides.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: onthewaydb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
