{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Something went wrong - OnTheWay</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header-left">
          <a href="/rides/">
            <img src="{% static 'OTWlogo.jpg' %}" alt="OnTheWay" class="logo" />
          </a>
        </div>
      </header>
      <main class="app-main">
        <div class="error-page">
          <span class="error-code">500</span>
          <h1>Something went wrong</h1>
          <p>We're having trouble processing your request. Please try again in a moment.</p>
          <a href="/rides/" class="btn-primary">Back to home</a>
        </div>
      </main>
    </div>
  </body>
</html>
